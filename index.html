<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT: HYROX DOUBLE-SPIDERS // CALIBRATION-v3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #06080b;
            --surface-color: rgba(16, 20, 28, 0.85);
            --surface-accent: rgba(26, 32, 44, 0.95);
            --spidey-red: #ff2a4b;
            --miles-blue: #00f0ff;
            --text-main: #f5f7fa;
            --text-muted: #7e8f9f;
            --border-color: rgba(42, 54, 74, 0.5);
            --glow-red: rgba(255, 42, 4b, 0.3);
            --glow-blue: rgba(0, 240, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
            position: relative;
        }

        /* SCI-FI SCREEN SCANNER */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(to bottom, transparent, var(--miles-blue), transparent);
            opacity: 0.05;
            z-index: 999;
            pointer-events: none;
            animation: radarSweep 8s linear infinite;
        }

        .tech-backdrop {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                linear-gradient(rgba(255, 42, 75, 0.008) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.008) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -3;
            pointer-events: none;
        }

        .spider-web {
            position: fixed;
            width: 200px;
            height: 200px;
            opacity: 0.04;
            pointer-events: none;
            z-index: -2;
        }
        .web-top-left { top: 0; left: 0; background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M0,0 L100,0 M0,0 L0,100 M0,0 L100,100 M0,0 L50,100 M0,0 L100,50 M10,0 Q10,10 0,10 M25,0 Q25,25 0,25 M45,0 Q45,45 0,45 M70,0 Q70,70 0,70 M100,0 Q100,100 0,100' stroke='white' stroke-width='0.4' fill='none'/></svg>"); }
        .web-bottom-right { bottom: 0; right: 0; transform: rotate(180deg); background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M0,0 L100,0 M0,0 L0,100 M0,0 L100,100 M0,0 L50,100 M0,0 L100,50 M10,0 Q10,10 0,10 M25,0 Q25,25 0,25 M45,0 Q45,45 0,45 M70,0 Q70,70 0,70 M100,0 Q100,100 0,100' stroke='white' stroke-width='0.4' fill='none'/></svg>"); }

        .miles-glitch-bg {
            position: fixed;
            bottom: -40px; right: -40px;
            width: 320px; height: 450px;
            opacity: 0.06;
            z-index: -1;
            pointer-events: none;
            background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><path d='M80,30 C75,18 60,10 45,15 C35,20 30,32 32,45 C30,55 35,65 45,70 C50,75 40,90 20,95 C45,105 75,100 85,85 C95,70 90,45 80,30 Z M42,42 C38,40 36,34 40,32 C44,30 48,34 46,38 Z M62,42 C64,46 70,44 68,40 C66,36 60,38 62,42 Z' fill='%23e61c38'/></svg>") no-repeat bottom right;
            background-size: contain;
            animation: spideyGlitch 10s infinite steps(1);
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 3.5rem 1rem 2rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background: radial-gradient(circle at center, rgba(16,20,28,0.5) 0%, transparent 100%);
        }

        .header-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--miles-blue);
            font-weight: 700;
            margin-bottom: 0.6rem;
            display: inline-block;
            border: 1px dashed var(--miles-blue);
            padding: 4px 10px;
            background: rgba(0, 240, 255, 0.02);
        }

        h1 {
            font-family: 'Bangers', cursive;
            font-size: 2.8rem;
            letter-spacing: 2px;
            color: var(--text-main);
            text-shadow: 3px 3px 0px var(--spidey-red);
            line-height: 1.1;
            margin-bottom: 0.8rem;
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto;
            padding: 0 0.5rem;
        }

        .subtitle span {
            color: var(--spidey-red);
            font-weight: 900;
        }

        /* MAIN CONTENT */
        main {
